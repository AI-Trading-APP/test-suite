name: Post-Merge Full Test Suite

on:
  push:
    branches: [development]

concurrency:
  group: post-merge-${{ github.sha }}
  cancel-in-progress: false

jobs:
  full-suite:
    uses: AI-Trading-APP/.github/.github/workflows/reusable-python-post-merge.yml@main
    with:
      service_name: test-suite
      has_lint: false
      has_tests: true
    secrets: inherit
